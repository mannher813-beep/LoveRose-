<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoveRose — Mode Hors-ligne</title>
  <style>
    body {
      background-color: #FFF1F2;
      color: #9F1239;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      padding: 30px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(225, 29, 72, 0.1);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      font-weight: 700;
      color: #E11D48;
    }
    p {
      color: #4C0519;
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 24px 0;
    }
    button {
      background-color: #E11D48;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #BE123C;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌹</div>
    <h1>Vous êtes hors-ligne</h1>
    <p>LoveRose a besoin d'une connexion internet pour charger de nouveaux profils et envoyer des messages doux.</p>
    <button onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
